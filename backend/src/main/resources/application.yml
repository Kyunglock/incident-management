server:
  port: 8080

spring:
  # 로컬 전용 설정은 application-local.yml 로 분리 (git 미추적).
  # SPRING_PROFILES_ACTIVE 로 다른 프로파일을 지정할 수 있다.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
      encoding: UTF-8

# git 연동 방식 기본값. 실제 저장소/토큰 등 환경별 값은 application-local.yml 에서 설정한다.
git:
  provider: ${GIT_PROVIDER:local}   # local(git CLI) | gitlab(REST API)
